<ion-header>
  <ion-toolbar>
    <ion-title>Emitir Senha</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-button expand="block" (click)="emit('SP')">Senha Prioritária (SP)</ion-button>
  <ion-button expand="block" (click)="emit('SG')">Senha Geral (SG)</ion-button>
  <ion-button expand="block" (click)="emit('SE')">Retirada de Exames (SE)</ion-button>

  <ion-list>
    <ion-item *ngFor="let t of tickets">
      <ion-label>
        <h2>{{t.id}}</h2>
        <p>{{t.type}} - Emitida: {{t.createdAt | date:'shortTime'}}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
