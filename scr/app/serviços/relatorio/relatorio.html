<ion-header>
  <ion-toolbar>
    <ion-title>Relatórios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-item *ngFor="let t of tickets">
      <ion-label>
        <h2>{{t.id}} - {{t.type}}</h2>
        <p>Emitida: {{t.createdAt | date:'short'}}<br>
        Atendida: {{t.attendedAt ? (t.attendedAt | date:'short') : '---'}}<br>
        Guichê: {{t.desk || '---'}}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
