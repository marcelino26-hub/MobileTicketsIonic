<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Relatório</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list>
    <ion-item *ngFor="let item of atendimentos">
      <ion-label>
        <h2>{{ item.nome }}</h2>
        <p>{{ item.mensagem }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

</ion-content>
