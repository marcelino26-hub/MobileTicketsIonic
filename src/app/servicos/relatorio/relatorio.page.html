<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Relatório</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list>
    <ion-item *ngFor="let t of tickets">
      <ion-label>
        <h2>Senha: {{ t.senha }} - {{ t.nome }}</h2>
        <p>{{ t.descricao }}</p>
        <small>{{ t.data | date:'short' }}</small>
      </ion-label>
    </ion-item>
  </ion-list>

</ion-content>
