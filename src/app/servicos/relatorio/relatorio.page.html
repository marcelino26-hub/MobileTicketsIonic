<ion-header>
  <ion-toolbar>
    <ion-title>Relatório de Senhas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card *ngIf="tickets.length === 0">
    <ion-card-content class="ion-text-center">
      <p>Nenhuma senha gerada ainda.</p>
    </ion-card-content>
  </ion-card>

  <ion-list *ngIf="tickets.length > 0">
    <ion-item *ngFor="let t of tickets; let i = index">
      <ion-label>
        <h2><strong>Senha #{{ t.senha }}</strong> - {{ t.nome }}</h2>
        <p>{{ t.descricao }}</p>
        <p style="font-size: 12px; color: #888;">{{ t.data | date:'short' }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
