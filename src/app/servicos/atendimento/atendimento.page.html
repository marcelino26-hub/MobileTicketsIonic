<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Atendimento</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-label position="floating">Nome</ion-label>
    <ion-input [(ngModel)]="nome"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Mensagem</ion-label>
    <ion-textarea [(ngModel)]="mensagem"></ion-textarea>
  </ion-item>

  <ion-button expand="block" (click)="enviar()">
    Enviar
  </ion-button>

</ion-content>
